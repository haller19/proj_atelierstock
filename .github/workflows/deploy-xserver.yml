name: Deploy to Xserver

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_DRIVE_CLIENT_ID: ${{ secrets.VITE_DRIVE_CLIENT_ID }}

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.XSERVER_KEY_B64 }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 10022 ${{ secrets.XSERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        shell: bash
        run: |
          ssh -p 10022 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes ${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }} exit

      - name: Deploy via rsync
        shell: bash
        run: |
          rsync -avz \
            -e "ssh -p 10022 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes" \
            dist/ \
            ${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}:${{ secrets.XSERVER_REMOTE_PATH }}/